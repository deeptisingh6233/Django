<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profiles</title>

```
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
        min-height:100vh;
        background:linear-gradient(135deg,#667eea,#764ba2);
        display:flex;
        justify-content:center;
        align-items:center;
        padding:40px;
    }

    .container{
        width:100%;
        max-width:900px;
        background:white;
        border-radius:20px;
        padding:30px;
        box-shadow:0 15px 40px rgba(0,0,0,0.2);
    }

    h1{
        text-align:center;
        margin-bottom:30px;
        color:#333;
    }

    .users-grid{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:20px;
    }

    .card{
        background:#f8f9ff;
        border-radius:15px;
        padding:25px;
        transition:0.3s;
        border-left:5px solid #667eea;
    }

    .card:hover{
        transform:translateY(-5px);
        box-shadow:0 10px 25px rgba(0,0,0,0.15);
    }

    .avatar{
        width:60px;
        height:60px;
        border-radius:50%;
        background:#667eea;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:24px;
        font-weight:bold;
        margin-bottom:15px;
    }

    .name{
        font-size:22px;
        font-weight:600;
        color:#333;
        margin-bottom:10px;
    }

    .subs{
        color:#666;
        font-size:16px;
    }

    .subs span{
        color:#667eea;
        font-weight:bold;
    }

    .empty{
        text-align:center;
        color:#777;
        font-size:18px;
    }
</style>
```

</head>
<body>

<div class="container">

```
<h1>🚀 User Profiles</h1>

<div class="users-grid">

    {% for user in users %}
    <div class="card">

        <div class="avatar">
            {{ user.name|first|upper }}
        </div>

        <div class="name">
            {{ user.name }}
        </div>

        <div class="subs">
            Subscribers:
            <span>{{ user.subscriber }}</span>
        </div>

    </div>
    {% empty %}
        <div class="empty">
            No users found.
        </div>
    {% endfor %}

</div>
```

</div>

</body>
</html>
