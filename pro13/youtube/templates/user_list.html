<!DOCTYPE html>

<html>
<head>
    <title>YouTube Users</title>
</head>
<body>

```
<h1>YouTube Users List</h1>

{% if users %}
    <ul>
        {% for user in users %}
            <li>
                {{ user.name }}
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>No users found.</p>
{% endif %}
```

</body>
</html>
